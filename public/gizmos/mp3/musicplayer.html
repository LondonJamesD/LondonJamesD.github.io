<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeuomorphic Wooden Player</title>
    <link rel="stylesheet" href="mp3_style.css">
    <script src="mp3_script.js" defer></script>
    
    <style>
        /* --- IFRAME WIDGET RESET --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Make the body transparent so your grid card's background color shows through */
            background: transparent; 
            /* Absolutely critical: prevents ugly iframe double-scrollbars */
            overflow: hidden; 
        }
    </style>
</head>
<body>

    <div id="mp3-player">
        <div class="screen-container">
            <div class="screen">
                <img id="cover-art" src="" alt="">
                <div class="screen-content">
                    <div class="track-info" id="track-title">Loading...</div>
                    <div class="time-info">
                        <span id="current-time">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>
            <div class="glass-gloss"></div>
        </div>

        <div class="progress-wrapper">
            <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
        </div>

        <div class="controls-pad">
            <button class="btn" id="btn-prev">⏮</button>
            <button class="btn" id="btn-play">▶</button>
            <button class="btn" id="btn-next">⏭</button>
        </div>
    </div>

</body>
</html>
